services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus3

    hostname: nexus

    restart: unless-stopped

    ports:
      - "8081:8081"

    environment:
      INSTALL4J_ADD_VM_PARAMS: >-
        -Xms2g
        -Xmx2g
        -XX:MaxDirectMemorySize=2g
        -Djava.util.prefs.userRoot=/nexus-data/javaprefs

    volumes:
      - nexus-data:/nexus-data

    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    networks:
      - nexus

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    mem_limit: 4g
    cpus: "2"

volumes:
  nexus-data:
    driver: local

networks:
  nexus:
    driver: bridge
