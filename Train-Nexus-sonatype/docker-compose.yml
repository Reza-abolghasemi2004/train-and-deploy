service:
    nexus:
      images: sonatype/nexus3
      container_name: nexus
      hostname: nexus
      
      restart: unless-stopped

      ports:
        - "8081:8081"

      volumes:
        - nexus-data:/nexus-data

      environment:
        INSTALL4J_ADD_VM_PARAMS: >-
          -Xms2g
          -Xmx2g
          -XX:MaxDirectMemorySize=2g
volumes:
  nexus-data: 
